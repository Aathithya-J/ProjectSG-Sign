<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singpass PDF Signer</title>
    <style>
        :root {
            --primary: #d71920;
            --primary-hover: #b3151a;
            --bg: #f4f7f6;
            --text: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 { margin-top: 0; color: var(--primary); font-size: 1.5rem; }
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 2rem;
            margin: 1.5rem 0;
            cursor: pointer;
            transition: border-color 0.3s;
            background-color: #fafafa;
        }
        .drop-zone.hover { border-color: var(--primary); background: #fff5f5; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600; }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 1.5rem; padding: 1rem; border-radius: 6px; display: none; }
        .info { background: #e3f2fd; color: #0d47a1; }
        .error { background: #ffebee; color: #b71c1c; text-align: left; }
        .success { background: #e8f5e9; color: #1b5e20; }
        .error-title { font-weight: bold; margin-bottom: 5px; }
        .error-detail { font-size: 0.85rem; font-family: monospace; white-space: pre-wrap; word-break: break-all; margin-top: 5px; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 4px; }
        #result-link { display: block; margin-top: 1rem; color: var(--primary); font-weight: bold; text-decoration: none; word-break: break-all; }
        #result-link:hover { text-decoration: underline; }
        #download-btn { margin-top: 1rem; background-color: #2e7d32; }
        .file-info { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Singpass PDF Signer</h1>
        <p>Upload a PDF to sign via Singpass Sign V3</p>
        
        <div class="drop-zone" id="drop-zone">
            Drag & drop PDF here or click to select
            <input type="file" id="file-input" accept="application/pdf" style="display: none;">
            <div id="file-name" class="file-info">No file selected</div>
        </div>

        <div class="input-group">
            <label for="signer-nric">Signer NRIC (Optional)</label>
            <input type="text" id="signer-nric" placeholder="e.g. S1234567A">
        </div>

        <button id="sign-btn" disabled>Sign Document</button>

        <div id="status"></div>
        <a id="result-link" target="_blank" style="display: none;">Go to Singpass to Sign</a>
        <button id="download-btn" style="display: none;">Download Signed PDF</button>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const signBtn = document.getElementById('sign-btn');
        const nricInput = document.getElementById('signer-nric');
        const statusDiv = document.getElementById('status');
        const resultLink = document.getElementById('result-link');
        const downloadBtn = document.getElementById('download-btn');

        let selectedFile = null;

        // Check for redirect back from Singpass
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            // request_id may come from the URL (passed by signed.html) or from localStorage as a fallback
            const requestId = urlParams.get('request_id') || localStorage.getItem('last_request_id');
            // exchange_code may come from the URL or from localStorage (persists across external redirects)
            const exchangeCode = urlParams.get('exchange_code') || localStorage.getItem('last_exchange_code');

            if (requestId && exchangeCode) {
                statusDiv.className = 'info';
                statusDiv.innerHTML = '<div class="loader"></div> Resuming session, checking status...';
                statusDiv.style.display = 'block';
                pollStatus(requestId, exchangeCode);
            }
        };

        dropZone.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        };

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('hover');
        };

        dropZone.ondragleave = () => dropZone.classList.remove('hover');

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        };

        function handleFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Please upload a PDF file.');
                return;
            }
            selectedFile = file;
            fileNameDisplay.textContent = `Selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            signBtn.disabled = false;
            statusDiv.style.display = 'none';
            resultLink.style.display = 'none';
            downloadBtn.style.display = 'none';
        }

        signBtn.onclick = async () => {
            if (!selectedFile) return;

            signBtn.disabled = true;
            statusDiv.className = 'info';
            statusDiv.innerHTML = '<div class="loader"></div> Initiating signing session...';
            statusDiv.style.display = 'block';
            resultLink.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);
            if (nricInput.value.trim()) {
                formData.append('signer_nric', nricInput.value.trim());
            }

            try {
                const response = await fetch('/api/sign', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.className = 'success';
                    statusDiv.textContent = 'Session created! Please sign the document via the link below.';
                    resultLink.href = result.signing_url;
                    resultLink.style.display = 'block';
                    
                    // Use localStorage so data persists after navigating to the Singpass portal and back
                    localStorage.setItem('last_exchange_code', result.exchange_code);
                    localStorage.setItem('last_request_id', result.sign_request_id);
                    localStorage.setItem('last_filename', selectedFile.name);
                    
                    pollStatus(result.sign_request_id, result.exchange_code);
                } else {
                    statusDiv.className = 'error';
                    let errorHtml = `<div class="error-title">Error ${response.status}: ${result.error || 'Request failed'}</div>`;
                    if (result.error_description) errorHtml += `<div>${result.error_description}</div>`;
                    if (result.error_details) errorHtml += `<div class="error-detail">${result.error_details}</div>`;
                    if (result.raw) errorHtml += `<div class="error-detail">${typeof result.raw === 'string' ? result.raw : JSON.stringify(result.raw, null, 2)}</div>`;
                    statusDiv.innerHTML = errorHtml;
                    signBtn.disabled = false;
                }
            } catch (err) {
                statusDiv.className = 'error';
                statusDiv.textContent = 'Error: ' + err.message;
                signBtn.disabled = false;
            }
        };

        async function pollStatus(id, exchangeCode) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/status?id=${id}&exchange_code=${exchangeCode}`);
                    const result = await response.json();

                    if (result.status === 'signed') {
                        clearInterval(interval);
                        statusDiv.className = 'success';
                        statusDiv.textContent = 'Document signed successfully!';
                        resultLink.style.display = 'none';
                        downloadBtn.style.display = 'block';

                        // Clean up localStorage after a successful signing session
                        localStorage.removeItem('last_exchange_code');
                        localStorage.removeItem('last_request_id');

                        downloadBtn.onclick = async () => {
                            downloadBtn.disabled = true;
                            const originalText = downloadBtn.textContent;
                            downloadBtn.textContent = 'Downloading...';
                            try {
                                const response = await fetch(`/api/download?id=${id}&exchange_code=${exchangeCode}`);
                                
                                // Check if response is JSON (error response)
                                const contentType = response.headers.get('content-type') || '';
                                if (contentType.includes('application/json')) {
                                    const errorData = await response.json();
                                    throw new Error(errorData.error || 'Download failed');
                                }
                                
                                // Check if response is successful
                                if (!response.ok) {
                                    throw new Error(`HTTP ${response.status}: Failed to download document`);
                                }
                                
                                // Check if we got a PDF
                                if (!contentType.includes('application/pdf')) {
                                    throw new Error('Invalid response: Expected PDF file');
                                }
                                
                                const blob = await response.blob();
                                
                                // Verify blob is not empty and looks like a PDF
                                if (blob.size === 0) {
                                    throw new Error('Downloaded file is empty');
                                }
                                if (!blob.type.includes('application/pdf')) {
                                    throw new Error('Downloaded file is not a valid PDF');
                                }
                                
                                const blobUrl = window.URL.createObjectURL(blob);
                                const link = document.createElement('a');
                                link.href = blobUrl;
                                
                                const originalName = localStorage.getItem('last_filename') || 'signed_document.pdf';
                                const signedName = originalName.toLowerCase().endsWith('.pdf') 
                                    ? originalName.replace(/\.pdf$/i, '_signed.pdf')
                                    : originalName + '_signed.pdf';
                                link.download = signedName;
                                document.body.appendChild(link);
                                link.click();
                                document.body.removeChild(link);
                                window.URL.revokeObjectURL(blobUrl);
                                
                                localStorage.removeItem('last_filename');
                                downloadBtn.textContent = originalText;
                                downloadBtn.disabled = false;
                            } catch (err) {
                                statusDiv.className = 'error';
                                statusDiv.textContent = 'Download failed: ' + err.message;
                                statusDiv.style.display = 'block';
                                downloadBtn.textContent = originalText;
                                downloadBtn.disabled = false;
                            }
                        };
                    } else if (result.status !== 'pending') {
                        clearInterval(interval);
                        statusDiv.className = 'error';
                        statusDiv.textContent = 'Signing failed: ' + (result.error || 'Unknown error');
                    }
                } catch (err) {
                    console.error('Polling error:', err);
                }
            }, 5000);
        }
    </script>
</body>
</html>
