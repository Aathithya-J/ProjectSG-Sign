<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singpass PDF Signer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d71920;
            --primary-hover: #b3151a;
            --bg: #f4f7f6;
            --text: #333;
        }
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        h1 { margin-top: 0; color: var(--primary); font-size: 1.75rem; font-weight: 700; }
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 2.5rem;
            margin: 1.5rem 0;
            cursor: pointer;
            transition: all 0.3s;
            background-color: #fafafa;
        }
        .drop-zone.hover { border-color: var(--primary); background: #fff5f5; transform: scale(1.02); }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600; color: #555; }
        input[type="text"] {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--primary); }
        
        /* Wrapper for the SVG button */
        #sign-btn-wrapper {
            width: 100%;
            cursor: pointer;
        }

        #sign-btn-wrapper svg {
            width: 100%;
            height: auto;
            border-radius: 8px;
            transition: opacity 0.2s;
        }

        #sign-btn-wrapper.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        #status { margin-top: 1.5rem; padding: 1.25rem; border-radius: 8px; display: none; font-size: 0.95rem; line-height: 1.5; }
        .info { background: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
        .error { background: #ffebee; color: #b71c1c; text-align: left; border: 1px solid #ffcdd2; }
        .success { background: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; }
        .error-title { font-weight: 700; margin-bottom: 8px; }
        .error-detail { font-size: 0.8rem; font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; word-break: break-all; margin-top: 8px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 4px; }
        
        #download-btn { 
            margin-top: 1rem; 
            background-color: #2e7d32; 
            width: 100%;
            height: 48px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        #download-btn:hover { background-color: #1b5e20; }
        
        .file-info { font-size: 0.85rem; color: #666; margin-top: 0.75rem; font-weight: 500; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Singpass PDF Signer</h1>
        <p style="color: #666; margin-bottom: 2rem;">Securely sign your PDF documents</p>
        
        <div class="drop-zone" id="drop-zone">
            <div style="font-weight: 600; color: #444;">Drag & drop PDF here</div>
            <div style="font-size: 0.85rem; color: #888; margin-top: 4px;">or click to select file</div>
            <input type="file" id="file-input" accept="application/pdf" style="display: none;">
            <div id="file-name" class="file-info">No file selected</div>
        </div>

        <div class="input-group">
            <label for="signer-nric">Signer NRIC (Optional)</label>
            <input type="text" id="signer-nric" placeholder="e.g. S1234567A">
        </div>

        <!-- Official Singpass Button from provided SVG asset -->

        <div id="status"></div>
        <button id="download-btn" style="display: none;">Download Signed PDF</button>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const signBtnWrapper = document.getElementById('sign-btn-wrapper');
        const nricInput = document.getElementById('signer-nric');
        const statusDiv = document.getElementById('status');
        const downloadBtn = document.getElementById('download-btn');

        let selectedFile = null;

        // Check for redirect back from Singpass
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const requestId = urlParams.get('request_id') || localStorage.getItem('last_request_id');
            const exchangeCode = urlParams.get('exchange_code') || localStorage.getItem('last_exchange_code');

            if (requestId && exchangeCode) {
                statusDiv.className = 'info';
                statusDiv.innerHTML = '<div class="loader"></div> Resuming session, checking status...';
                statusDiv.style.display = 'block';
                pollStatus(requestId, exchangeCode);
            }
        };

        dropZone.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        };

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('hover');
        };

        dropZone.ondragleave = () => dropZone.classList.remove('hover');

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        };

        function handleFile(file) {
            if (file.type !== 'application/pdf') {
                alert('Please upload a PDF file.');
                return;
            }
            selectedFile = file;
            fileNameDisplay.textContent = `Selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            signBtnWrapper.classList.remove('disabled');
            statusDiv.style.display = 'none';
            downloadBtn.style.display = 'none';
        }

        signBtnWrapper.onclick = async () => {
            if (signBtnWrapper.classList.contains('disabled')) return;
            if (!selectedFile) return;

            signBtnWrapper.classList.add('disabled');
            statusDiv.className = 'info';
            statusDiv.innerHTML = '<div class="loader"></div> Initiating signing session...';
            statusDiv.style.display = 'block';

            const formData = new FormData();
            formData.append('file', selectedFile);
            if (nricInput.value.trim()) {
                formData.append('signer_nric', nricInput.value.trim());
            }

            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.className = 'info';
                    statusDiv.innerHTML = '<div class="loader"></div> Redirecting to Singpass...';
                    
                    localStorage.setItem('last_exchange_code', result.exchange_code);
                    localStorage.setItem('last_request_id', result.sign_request_id);
                    localStorage.setItem('last_filename', selectedFile.name);
                    
                    window.location.href = result.signing_url;
                } else {
                    statusDiv.className = 'error';
                    let errorHtml = `<div class="error-title">Error ${response.status}: ${result.error || 'Request failed'}</div>`;
                    if (result.error_description) errorHtml += `<div>${result.error_description}</div>`;
                    if (result.error_details) errorHtml += `<div class="error-detail">${result.error_details}</div>`;
                    statusDiv.innerHTML = errorHtml;
                    signBtnWrapper.classList.remove('disabled');
                }
            } catch (err) {
                statusDiv.className = 'error';
                statusDiv.textContent = 'Error: ' + err.message;
                signBtnWrapper.classList.remove('disabled');
            }
        };

        async function pollStatus(id, exchangeCode) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/status?id=${id}&exchange_code=${exchangeCode}`);
                    const result = await response.json();

                    if (result.status === 'signed') {
                        clearInterval(interval);
                        statusDiv.className = 'success';
                        statusDiv.textContent = 'Document signed successfully! The signed PDF has also been emailed to info@project.sg.';
                        downloadBtn.style.display = 'block';

                        localStorage.removeItem('last_exchange_code');
                        localStorage.removeItem('last_request_id');

                        downloadBtn.onclick = async () => {
                            downloadBtn.disabled = true;
                            const originalText = downloadBtn.textContent;
                            downloadBtn.textContent = 'Downloading...';
                            try {
                                const response = await fetch(`/api/download?id=${id}&exchange_code=${exchangeCode}`);
                                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                                
                                const blob = await response.blob();
                                const url = window.URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.href = url;
                                const originalName = localStorage.getItem('last_filename') || 'document.pdf';
                                a.download = originalName.replace('.pdf', '_signed.pdf');
                                document.body.appendChild(a);
                                a.click();
                                window.URL.revokeObjectURL(url);
                                document.body.removeChild(a);
                            } catch (err) {
                                alert('Download failed: ' + err.message);
                            } finally {
                                downloadBtn.disabled = false;
                                downloadBtn.textContent = originalText;
                            }
                        };
                    } else if (result.status === 'expired' || result.status === 'failed') {
                        clearInterval(interval);
                        statusDiv.className = 'error';
                        statusDiv.textContent = `Signing session ${result.status}. Please try again.`;
                        signBtnWrapper.classList.remove('disabled');
                    }
                } catch (err) {
                    console.error('Polling error:', err);
                }
            }, 3000);
        }
    </script>
</body>
</html>
