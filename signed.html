<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d71920;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #2e7d32; margin-bottom: 1rem; }
        p { color: #666; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2>Signing Successful!</h2>
        <p>Your document has been signed via Singpass. Redirecting you back to download your document...</p>
    </div>

    <script>
        // Singpass redirects with request_id and status=success
        const urlParams = new URLSearchParams(window.location.search);
        const requestId = urlParams.get('request_id') || urlParams.get('sign_request_id')
                          || localStorage.getItem('last_request_id');

        // Recover the exchange_code from localStorage (persists across external redirects)
        const exchangeCode = localStorage.getItem('last_exchange_code');

        let targetUrl = '/';
        if (requestId) {
            targetUrl += `?request_id=${requestId}`;
            if (exchangeCode) {
                targetUrl += `&exchange_code=${exchangeCode}`;
            }
        }

        // Short delay to show the success message before redirecting
        setTimeout(() => {
            window.location.href = targetUrl;
        }, 1500);
    </script>
</body>
</html>
