<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing Result — Sign with Singpass</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sp-red: #F4333D;
            --sp-red-hover: #B0262D;
            --text-primary: #1a1a1a;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --bg-page: #f3f4f6;
            --bg-card: #ffffff;
            --success-bg: #f0fdf4;
            --success-text: #166534;
            --success-border: #bbf7d0;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
            --error-border: #fecaca;
            --info-bg: #eff6ff;
            --info-text: #1e40af;
            --info-border: #bfdbfe;
            --warning-bg: #fffbeb;
            --warning-text: #92400e;
            --warning-border: #fde68a;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
            color: var(--text-primary);
        }

        /* ── Brand header ── */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--sp-red);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        /* ── Card ── */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            width: 100%;
            max-width: 480px;
            padding: 40px 32px 32px;
            text-align: center;
        }

        /* ── Loader ── */
        .loader-wrap {
            margin-bottom: 24px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #f3f3f3;
            border-top-color: var(--sp-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── State icon ── */
        .state-icon {
            display: none;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin: 0 auto 20px;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .state-icon.success { background: #dcfce7; color: #16a34a; display: flex; }
        .state-icon.error   { background: #fee2e2; color: #dc2626; display: flex; }
        .state-icon.warning { background: #fef3c7; color: #d97706; display: flex; }
        .state-icon.expired { background: #ede9fe; color: #7c3aed; display: flex; }

        /* ── Typography ── */
        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.4px;
        }

        .card-subtitle {
            font-size: 13.5px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* ── Status box ── */
        #status {
            padding: 13px 15px;
            border-radius: var(--radius-sm);
            display: none;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid;
            text-align: left;
            margin-bottom: 20px;
        }

        #status.info    { background: var(--info-bg);    color: var(--info-text);    border-color: var(--info-border); }
        #status.error   { background: var(--error-bg);   color: var(--error-text);   border-color: var(--error-border); }
        #status.success { background: var(--success-bg); color: var(--success-text); border-color: var(--success-border); }
        #status.warning { background: var(--warning-bg); color: var(--warning-text); border-color: var(--warning-border); }

        /* ── Buttons ── */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-primary {
            background: #059669;
            color: white;
        }

        .btn-primary:hover { background: #047857; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-danger {
            background: var(--sp-red);
            color: white;
        }

        .btn-danger:hover { background: var(--sp-red-hover); }

        .btn-secondary {
            background: #f3f4f6;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover { background: #e5e7eb; }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            .card { padding: 32px 20px 24px; }
            .card-title { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/>
            </svg>
        </div>
        <span class="brand-name">PDF Signer</span>
    </div>

    <div class="card">
        <div class="loader-wrap" id="loader-wrap">
            <div class="loader"></div>
        </div>

        <div class="state-icon" id="state-icon"></div>

        <h1 class="card-title" id="card-title">Verifying your signature…</h1>
        <p class="card-subtitle" id="card-subtitle">Please wait while we confirm your signing request with Singpass.</p>

        <div id="status"></div>

        <div class="btn-group" id="btn-group" style="display: none;">
            <button class="btn btn-primary" id="download-btn" style="display:none;">⬇ Download Signed PDF</button>
            <button class="btn btn-danger"  id="retry-btn"   style="display:none;">Try Again</button>
            <button class="btn btn-secondary" id="back-btn"  style="display:none;">Back to Upload</button>
        </div>
    </div>

    <script>
        const urlParams    = new URLSearchParams(window.location.search);
        const requestId    = urlParams.get('request_id') || urlParams.get('sign_request_id') || localStorage.getItem('last_request_id');
        const exchangeCode = localStorage.getItem('last_exchange_code');

        const loaderWrap  = document.getElementById('loader-wrap');
        const stateIcon   = document.getElementById('state-icon');
        const cardTitle   = document.getElementById('card-title');
        const cardSubtitle= document.getElementById('card-subtitle');
        const statusDiv   = document.getElementById('status');
        const btnGroup    = document.getElementById('btn-group');
        const downloadBtn = document.getElementById('download-btn');
        const retryBtn    = document.getElementById('retry-btn');
        const backBtn     = document.getElementById('back-btn');

        // ── Check URL error params ────────────────────────────────────────────
        function checkErrorStatus() {
            const status = urlParams.get('status');
            const error  = urlParams.get('error');
            if (status === 'cancelled' || error === 'cancelled') {
                showCancelled();
                return true;
            }
            if (status === 'failed' || error) {
                showError('Signing Failed', error || 'The signing process failed. Please try again.');
                return true;
            }
            return false;
        }

        // ── Fetch signed document ─────────────────────────────────────────────
        async function fetchSignedDocument() {
            if (checkErrorStatus()) return;

            if (!requestId || !exchangeCode) {
                showError('Missing Information', 'Missing request ID or exchange code. Please go back and try again.');
                return;
            }

            try {
                const response = await fetch(`/api/status?id=${requestId}&exchange_code=${exchangeCode}`);

                let result;
                const ct = response.headers.get('content-type') || '';
                if (ct.includes('application/json')) {
                    result = await response.json();
                } else {
                    result = { error: 'Non-JSON response from status API' };
                }

                if (result.status === 'signed') {
                    showDownloadUI();
                } else if (result.status === 'pending') {
                    showError('Still Processing', 'Your document is still being processed. Please wait a moment and refresh the page.');
                } else if (result.status === 'cancelled') {
                    showCancelled();
                } else if (result.status === 'expired') {
                    showExpired();
                } else {
                    showError('Signing Failed', 'Failed to retrieve signed document: ' + (result.error || 'Unknown error'));
                }
            } catch (err) {
                showError('Connection Error', 'Error fetching signed document: ' + err.message);
            }
        }

        // ── UI states ─────────────────────────────────────────────────────────
        function hideLoader() {
            loaderWrap.style.display = 'none';
        }

        function showDownloadUI() {
            hideLoader();
            stateIcon.textContent = '✓';
            stateIcon.className   = 'state-icon success';
            cardTitle.textContent = 'Document Signed!';
            cardSubtitle.textContent = 'Your document has been signed successfully via Singpass.';

            statusDiv.className   = 'success';
            statusDiv.textContent = 'The signed PDF has been emailed to info@project.sg.';
            statusDiv.style.display = 'block';

            btnGroup.style.display   = 'flex';
            downloadBtn.style.display = 'block';

            downloadBtn.onclick = async () => {
                downloadBtn.disabled    = true;
                downloadBtn.textContent = 'Downloading…';
                try {
                    const res = await fetch(`/api/download?id=${requestId}&exchange_code=${exchangeCode}`);
                    const ct  = res.headers.get('content-type') || '';

                    if (ct.includes('application/json')) {
                        const err = await res.json();
                        throw new Error(err.error || 'Download failed');
                    }
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    if (!ct.includes('application/pdf')) throw new Error('Invalid response: expected PDF');

                    const blob = await res.blob();
                    if (blob.size === 0) throw new Error('Downloaded file is empty');

                    const blobUrl = window.URL.createObjectURL(blob);
                    const link    = document.createElement('a');
                    link.href     = blobUrl;
                    const orig    = localStorage.getItem('last_filename') || 'document.pdf';
                    link.download = orig.replace(/\.pdf$/i, '_signed.pdf');
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(blobUrl);

                    localStorage.removeItem('last_exchange_code');
                    localStorage.removeItem('last_request_id');
                    localStorage.removeItem('last_filename');
                } catch (err) {
                    statusDiv.className   = 'error';
                    statusDiv.textContent = 'Download failed: ' + err.message;
                    statusDiv.style.display = 'block';
                } finally {
                    downloadBtn.disabled    = false;
                    downloadBtn.textContent = '⬇ Download Signed PDF';
                }
            };
        }

        function showError(title, msg) {
            hideLoader();
            stateIcon.textContent = '✕';
            stateIcon.className   = 'state-icon error';
            cardTitle.textContent = title;
            cardSubtitle.textContent = '';

            statusDiv.className   = 'error';
            statusDiv.textContent = msg;
            statusDiv.style.display = 'block';

            btnGroup.style.display  = 'flex';
            retryBtn.style.display  = 'block';
            backBtn.style.display   = 'block';
            wireBackButtons();
        }

        function showCancelled() {
            hideLoader();
            stateIcon.textContent = '⊘';
            stateIcon.className   = 'state-icon warning';
            cardTitle.textContent = 'Signing Cancelled';
            cardSubtitle.textContent = 'You cancelled the signing process. Your document was not signed.';

            statusDiv.className   = 'warning';
            statusDiv.textContent = 'You can start the signing process again at any time.';
            statusDiv.style.display = 'block';

            btnGroup.style.display  = 'flex';
            retryBtn.style.display  = 'block';
            backBtn.style.display   = 'block';
            wireBackButtons();
        }

        function showExpired() {
            hideLoader();
            stateIcon.textContent = '⏱';
            stateIcon.className   = 'state-icon expired';
            cardTitle.textContent = 'Session Expired';
            cardSubtitle.textContent = 'Your signing session has expired.';

            statusDiv.className   = 'warning';
            statusDiv.textContent = 'Please start the signing process again.';
            statusDiv.style.display = 'block';

            btnGroup.style.display  = 'flex';
            retryBtn.style.display  = 'block';
            backBtn.style.display   = 'block';
            wireBackButtons();
        }

        function wireBackButtons() {
            const clearAndGo = () => {
                localStorage.removeItem('last_exchange_code');
                localStorage.removeItem('last_request_id');
                localStorage.removeItem('last_filename');
                window.location.href = '/';
            };
            retryBtn.onclick = clearAndGo;
            backBtn.onclick  = clearAndGo;
        }

        window.onload = () => fetchSignedDocument();
    </script>
</body>
</html>
