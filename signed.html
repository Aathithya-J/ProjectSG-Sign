<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Signed - Singpass PDF Signer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f7f9; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 500px; text-align: center; }
        .success-icon { color: #2e7d32; font-size: 64px; margin-bottom: 20px; }
        h1 { margin-bottom: 20px; font-size: 24px; color: #2e7d32; }
        p { margin-bottom: 30px; color: #666; line-height: 1.5; }
        .btn { display: inline-block; background-color: #d32f2f; color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; transition: background-color 0.3s; }
        .btn:hover { background-color: #b71c1c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Document signed successfully</h1>
        <p>Your document has been signed via Singpass. You can close this window or return to the application to download the signed file.</p>
        <a href="/" class="btn">Return to App</a>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const requestId = urlParams.get('sign_request_id');
        if (requestId) {
            console.log('Signed request ID:', requestId);
        }
    </script>
</body>
</html>
