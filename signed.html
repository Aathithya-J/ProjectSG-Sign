<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Signed Successfully</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d71920;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #2e7d32; margin-bottom: 1rem; margin-top: 0; }
        p { color: #666; line-height: 1.5; margin: 1rem 0; }
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            flex: 1;
            min-width: 150px;
        }
        #download-btn {
            background-color: #2e7d32;
            color: white;
        }
        #download-btn:hover {
            background-color: #1b5e20;
        }
        #download-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #continue-btn {
            background-color: #d71920;
            color: white;
        }
        #continue-btn:hover {
            background-color: #b3151a;
        }
        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
        }
        .info { background: #e3f2fd; color: #0d47a1; }
        .error { background: #ffebee; color: #b71c1c; }
        .success { background: #e8f5e9; color: #1b5e20; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader" id="loader"></div>
        <h2 id="title">Signing Successful!</h2>
        <p id="message">Your document has been signed via Singpass. Preparing your download...</p>
        
        <div id="status"></div>
        
        <div class="button-group" id="button-group" style="display: none;">
            <button id="download-btn">Download Signed PDF</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const requestId = urlParams.get('request_id') || urlParams.get('sign_request_id')
                          || localStorage.getItem('last_request_id');
        const exchangeCode = localStorage.getItem('last_exchange_code');
        const statusDiv = document.getElementById('status');
        const loader = document.getElementById('loader');
        const buttonGroup = document.getElementById('button-group');
        const downloadBtn = document.getElementById('download-btn');
        const title = document.getElementById('title');
        const message = document.getElementById('message');

        let signedDocUrl = null;

        // Fetch the signed document URL from the status API
        async function fetchSignedDocument() {
            if (!requestId || !exchangeCode) {
                showError('Missing request ID or exchange code. Please go back and try again.');
                return;
            }

            try {
                const response = await fetch(`/api/status?id=${requestId}&exchange_code=${exchangeCode}`);
                const result = await response.json();

                if (result.status === 'signed' && result.signed_doc_url) {
                    signedDocUrl = result.signed_doc_url;
                    showDownloadUI();
                } else if (result.status === 'pending') {
                    showError('Document is still being processed. Please wait a moment and refresh.');
                } else {
                    showError('Failed to retrieve signed document: ' + (result.error || 'Unknown error'));
                }
            } catch (err) {
                showError('Error fetching signed document: ' + err.message);
            }
        }

        function showDownloadUI() {
            loader.style.display = 'none';
            title.textContent = 'Document Signed Successfully!';
            message.textContent = 'Your document is ready to download.';
            buttonGroup.style.display = 'flex';

            downloadBtn.onclick = async () => {
                downloadBtn.disabled = true;
                downloadBtn.textContent = 'Downloading...';
                try {
                    // Use the backend proxy to fetch the PDF and bypass CORS
                    const response = await fetch(`/api/download?id=${requestId}&exchange_code=${exchangeCode}`);
                    
                    // Check if response is JSON (error response)
                    const contentType = response.headers.get('content-type') || '';
                    if (contentType.includes('application/json')) {
                        const errorData = await response.json();
                        let errorMsg = errorData.error || 'Download failed';
                        if (errorData.description) {
                            errorMsg += ': ' + errorData.description;
                        }
                        throw new Error(errorMsg);
                    }
                    
                    // Check if response is successful
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: Failed to download document`);
                    }
                    
                    // Check if we got a PDF
                    if (!contentType.includes('application/pdf')) {
                        throw new Error('Invalid response: Expected PDF file');
                    }
                    
                    const blob = await response.blob();
                    
                    // Verify blob is not empty and looks like a PDF
                    if (blob.size === 0) {
                        throw new Error('Downloaded file is empty');
                    }
                    if (!blob.type.includes('application/pdf')) {
                        throw new Error('Downloaded file is not a valid PDF');
                    }
                    
                    // Create a blob URL and trigger download
                    const blobUrl = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    
                    const originalName = localStorage.getItem('last_filename') || 'signed_document.pdf';
                    const signedName = originalName.toLowerCase().endsWith('.pdf') 
                        ? originalName.replace(/\.pdf$/i, '_signed.pdf')
                        : originalName + '_signed.pdf';
                    link.download = signedName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(blobUrl);
                    
                    // Clean up localStorage after successful download
                    localStorage.removeItem('last_exchange_code');
                    localStorage.removeItem('last_request_id');
                    localStorage.removeItem('last_filename');
                    
                    downloadBtn.textContent = 'Download Signed PDF';
                    downloadBtn.disabled = false;
                } catch (err) {
                    statusDiv.className = 'error';
                    statusDiv.textContent = 'Download failed: ' + err.message;
                    statusDiv.style.display = 'block';
                    downloadBtn.textContent = 'Download Signed PDF';
                    downloadBtn.disabled = false;
                }
            };


        }

        function showError(errorMsg) {
            loader.style.display = 'none';
            title.textContent = 'Error';
            message.style.display = 'none';
            statusDiv.className = 'error';
            statusDiv.textContent = errorMsg;
            statusDiv.style.display = 'block';
        }

        // Fetch signed document when page loads
        window.onload = () => {
            fetchSignedDocument();
        };
    </script>
</body>
</html>
